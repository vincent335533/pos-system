<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>簡易 POS 系統</title>

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
overflow-x:hidden;
font-family:Arial;
background:#f5f5f5;
}

/* 總金額區 */
#total-bar{
background:#2196F3;
color:white;
padding:10px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:20;
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

/* 左側總金額 */
.total-text{
font-size:24px;
font-weight:bold;
}

/* 右側收銀 */
.cash-box{
display:flex;
align-items:center;
gap:10px;
font-size:18px;
}

.cash-box input{
width:100px;
font-size:18px;
padding:5px;
}

/* 找零 */
.change-text{
font-size:20px;
font-weight:bold;
}

/* 商品區 */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
margin-top:90px;
margin-bottom:220px;
}

/* 商品卡片 */
.product{
background:white;
border-radius:12px;
padding:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
min-height:120px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.product-name{
font-size:22px;
font-weight:bold;
}

.price-row{
display:flex;
align-items:center;
justify-content:space-between;
margin-top:6px;
}

.price{
font-size:18px;
}

.btn-group{
display:flex;
gap:8px;
}

button{
font-size:24px;
width:50px;
height:50px;
border:none;
border-radius:10px;
}

.add-btn{
background:#4CAF50;
color:white;
}

.remove-btn{
background:#f44336;
color:white;
}

.qty{
font-size:18px;
margin-top:6px;
font-weight:bold;
}

/* 訂單明細 */
#order-detail{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:15px;
border-top:2px solid #ddd;
max-height:200px;
overflow-y:auto;
z-index:10;
}

.detail-item{
padding:8px;
border-bottom:1px solid #eee;
font-size:18px;
cursor:pointer;
}

.bottom-bar{
display:flex;
margin-top:10px;
}

.bottom-bar button{
flex:1;
font-size:20px;
padding:15px;
height:auto;
}

.clear-btn{
background:#555;
color:white;
}

</style>
</head>

<body>

<div id="total-bar">

<div class="total-text">
總金額: <span id="total">0</span> 元
</div>

<div class="cash-box">
收銀
<input type="number" id="cash" step="10" oninput="calculateChange()">
</div>

<div class="change-text">
找零: <span id="change">0</span> 元
</div>

</div>

<div class="grid" id="product-buttons"></div>

<div id="order-detail">
<h3>訂單明細（點擊可減少）</h3>
<div id="detail-list">尚未點單</div>

<div class="bottom-bar">
<button class="clear-btn" onclick="clearOrder()">清除訂單</button>
</div>
</div>

<script>

const products=[
{id:1,name:"福金",price:16},
{id:2,name:"壽金",price:16},
{id:3,name:"刈金",price:16},
{id:4,name:"四色金",price:40},
{id:5,name:"五色金",price:50},
{id:6,name:"30土地公",price:30},
{id:7,name:"50土地公",price:50},
{id:8,name:"10元香",price:10},
{id:9,name:"100元香",price:100},
{id:10,name:"大寶箱",price:250},
{id:11,name:"蠟燭",price:25},
{id:12,name:"漢堡",price:120},
{id:13,name:"薯條",price:60},
{id:14,name:"沙拉",price:75},
{id:15,name:"壽司",price:150},
{id:16,name:"拉麵",price:180},
{id:17,name:"豬排",price:350},
{id:18,name:"披薩",price:250},
{id:19,name:"冰淇淋",price:100},
{id:20,name:"EE",price:520}
]

let order={}

const productButtons=document.getElementById("product-buttons")

products.forEach(p=>{

const div=document.createElement("div")
div.className="product"

div.innerHTML=`

<div class="product-name">${p.name}</div>

<div class="price-row">
<div class="price">${p.price} 元</div>

<div class="btn-group">
<button class="add-btn" onclick="addToOrder(${p.id})">+</button>
<button class="remove-btn" onclick="removeFromOrder(${p.id})">-</button>
</div>
</div>

<div class="qty" id="qty-${p.id}">數量:0</div>

`

productButtons.appendChild(div)

})

function addToOrder(id){
if(!order[id])order[id]=0
order[id]++
updatePOS()
}

function removeFromOrder(id){
if(order[id]&&order[id]>0){
order[id]--
if(order[id]==0)delete order[id]
updatePOS()
}
}

function updatePOS(){

let total=0
let detailHTML=""

products.forEach(p=>{

let qty=order[p.id]||0

document.getElementById(`qty-${p.id}`).textContent="數量:"+qty

if(qty>0){

let subtotal=p.price*qty
total+=subtotal

detailHTML+=`
<div class="detail-item" onclick="removeFromOrder(${p.id})">
${p.name} x ${qty} = ${subtotal} 元
</div>
`

}

})

if(detailHTML=="")detailHTML="尚未點單"

document.getElementById("detail-list").innerHTML=detailHTML
document.getElementById("total").textContent=total

calculateChange()

}

function calculateChange(){

let total=parseInt(document.getElementById("total").textContent)||0
let cash=parseInt(document.getElementById("cash").value)||0

let change=cash-total

if(change<0) change=0

document.getElementById("change").textContent=change

}

function clearOrder(){

order={}

products.forEach(p=>{
document.getElementById(`qty-${p.id}`).textContent="數量:0"
})

document.getElementById("detail-list").innerHTML="尚未點單"
document.getElementById("total").textContent=0
document.getElementById("cash").value=""
document.getElementById("change").textContent=0

}

</script>

</body>
</html>
